<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#7A2E5A">
<meta name="description" content="PDF-выгрузка цикла Lira: календарь, фаза, дневник симптомов.">
<meta name="robots" content="noindex,nofollow">
<title>Lira · цикл в PDF</title>
<link rel="stylesheet" href="/legal/style.css">
<link rel="icon" href="/favicon.ico">
<style>
  /* Screen view — looks like other Lira pages. */
  .sp-toolbar{
    position:sticky; top:0; z-index:10;
    background:#FFFCF7; border-bottom:1px solid var(--border);
    padding:10px 16px; display:flex; gap:8px; align-items:center;
    flex-wrap:wrap;
  }
  .sp-toolbar .ttl{flex:1; font-size:14px; color:var(--muted); margin:0}
  .sp-toolbar .ttl b{color:var(--text)}
  .sp-toolbar button{
    background:var(--accent); color:#fff; border:none;
    padding:8px 16px; border-radius:18px; cursor:pointer; font-size:14px;
    font-family:inherit; font-weight:600;
  }
  .sp-toolbar button.secondary{
    background:transparent; color:var(--text-soft);
    border:1px solid var(--border);
  }
  .sp-page{ max-width:680px; margin:0 auto; padding:18px 16px 40px }
  .sp-h1{ font-size:22px; margin:0 0 4px; color:var(--text) }
  .sp-sub{ font-size:13px; color:var(--muted); margin:0 0 18px }
  .sp-card{
    background:var(--bg-soft); border:1px solid var(--border);
    border-radius:14px; padding:14px 16px; margin:0 0 14px;
  }
  .sp-card h2{ font-size:16px; margin:0 0 8px; color:var(--text) }
  .sp-row{ display:flex; justify-content:space-between; gap:10px; padding:6px 0;
           border-bottom:1px dashed var(--border); font-size:14px; color:var(--text-soft) }
  .sp-row:last-child{ border-bottom:none }
  .sp-row b{ color:var(--text) }
  .sp-empty{ color:var(--muted); font-size:13px }
  .sp-chart{ display:flex; align-items:flex-end; gap:1px; height:64px; padding:4px 0;
             overflow-x:auto; background:#FFF; border:1px solid var(--border);
             border-radius:8px; padding:6px 8px }
  .sp-chart .bar{ flex:1 0 5px; min-width:4px; border-radius:2px 2px 0 0;
                  background:#9F4830; opacity:0.85 }
  .sp-chart .bar.lvl-0{ background:transparent; border-bottom:1px solid var(--border) }
  .sp-chart .bar.lvl-1{ background:#E3C5A0 }
  .sp-chart .bar.lvl-2{ background:#D2A079 }
  .sp-chart .bar.lvl-3{ background:#C28161 }
  .sp-chart .bar.lvl-4{ background:#B26345 }
  .sp-chart .bar.lvl-5{ background:#9F4830 }
  .sp-symptom-name{ font-size:13px; font-weight:600; margin:8px 0 4px; color:var(--text) }
  .sp-symptom-name .avg{ color:var(--muted); font-weight:400; margin-left:8px; font-size:12px }
  .sp-footer{ font-size:12px; color:var(--muted); text-align:center; margin-top:24px; line-height:1.6 }
  .sp-status{ font-size:13px; color:var(--muted); margin:8px 0; min-height:18px }
  .sp-status.error{ color:#b13d3d } .sp-status.ok{ color:#4f8a3a }

  /* Print stylesheet — strip toolbar, headers, footers. */
  @media print {
    .sp-toolbar, header.lira-header, .sp-footer-only-screen { display:none !important }
    body { background:#fff; color:#000 }
    .sp-card { break-inside: avoid; border:1px solid #ccc; box-shadow:none }
    .sp-page { padding:0; max-width:none }
    a { color:#000; text-decoration:none }
  }
</style>
</head>
<body>

<header class="lira-header sp-footer-only-screen">
  <a class="brand" href="/">🌸 Lira · PDF цикла</a>
  <span class="spacer"></span>
  <a class="home" href="/">В приложение</a>
</header>

<div class="sp-toolbar">
  <p class="ttl"><b>Lira</b> · сохраните в PDF и перешлите партнёру</p>
  <button id="sp-print" type="button">📄 Сохранить как PDF</button>
  <button id="sp-share" type="button" class="secondary">📤 Поделиться</button>
</div>

<main class="sp-page">
  <h1 class="sp-h1" id="sp-title">Цикл Lira</h1>
  <p class="sp-sub" id="sp-sub">Готовится отчёт…</p>
  <div class="sp-status" id="sp-status"></div>

  <section class="sp-card" id="sp-card-calendar" hidden>
    <h2>📅 Календарь и прогноз</h2>
    <div id="sp-calendar-body" class="sp-empty">Загружаю…</div>
  </section>

  <section class="sp-card" id="sp-card-phase" hidden>
    <h2>🌙 Текущая фаза</h2>
    <div id="sp-phase-body" class="sp-empty">Загружаю…</div>
  </section>

  <section class="sp-card" id="sp-card-symptoms" hidden>
    <h2>📊 Симптомы и графики</h2>
    <div id="sp-symptoms-body" class="sp-empty">Загружаю…</div>
  </section>

  <section class="sp-card" id="sp-card-notes" hidden>
    <h2>📝 Заметки</h2>
    <div id="sp-notes-body" class="sp-empty">Загружаю…</div>
  </section>

  <p class="sp-footer">Создано в приложении <a href="/">Lira</a> · трекер цикла и подписочный сервис</p>
</main>

<script>
"use strict";

const SP_SUB_KEY  = "@lira/subscription/v1";
const SP_APP_KEY  = "@cycle-tracker/data/v1";
const SP_DEV_KEY  = "@lira/sync/device-id/v1";

const SYMPTOM_LABELS = {
  cramps:   { label:"Спазмы",      emoji:"💢" },
  headache: { label:"Голова",      emoji:"🤕" },
  mood:     { label:"Настроение",  emoji:"💭" },
  energy:   { label:"Энергия",     emoji:"⚡" },
  sleep:    { label:"Сон",         emoji:"😴" },
  appetite: { label:"Аппетит",     emoji:"🍽️" },
  bloating: { label:"Вздутие",     emoji:"🎈" },
  acne:     { label:"Высыпания",   emoji:"🔴" },
  libido:   { label:"Либидо",      emoji:"🌶️" },
  anxiety:  { label:"Тревога",     emoji:"🌪️" },
};

function $(id){ return document.getElementById(id); }
function safeJSON(k){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):null; }catch(_){return null;} }
function hasActiveSubscription(){
  const sub = safeJSON(SP_SUB_KEY); if(!sub) return false;
  if(sub.cancelled) return false;
  const renew = sub.renewsAt || sub.renews_at || sub.activeUntil;
  if(renew){ const t=Date.parse(renew); if(!isNaN(t) && t<Date.now()) return false; }
  if(sub.tier === "free" || sub.tier === null) return false;
  return !!(sub.valid || sub.active || sub.tier);
}

function getParams(){
  const u = new URL(window.location.href);
  const parts = (u.searchParams.get("parts") || "").split(",").filter(Boolean);
  const cycle = u.searchParams.get("cycle") || localStorage.getItem(SP_DEV_KEY) || "";
  return { parts: new Set(parts), cycle };
}

function fmtDate(d){
  if(!(d instanceof Date)) d = new Date(d);
  if(isNaN(d)) return "—";
  return d.toLocaleDateString("ru-RU", {day:"2-digit", month:"long", year:"numeric"});
}
function fmtShort(d){
  if(!(d instanceof Date)) d = new Date(d);
  if(isNaN(d)) return "—";
  return d.toLocaleDateString("ru-RU", {day:"2-digit", month:"2-digit"});
}
function daysUntil(date){
  const d = (date instanceof Date) ? date : new Date(date);
  return Math.round((d - new Date()) / 86400000);
}
function pluralDay(n){
  n = Math.abs(n);
  if(11 <= (n%100) && (n%100) <= 14) return "дней";
  const r = n%10;
  if(r === 1) return "день";
  if(r >= 2 && r <= 4) return "дня";
  return "дней";
}

// ----- Calendar + phase ---------------------------------------------------- //
function readAppData(){
  const raw = safeJSON(SP_APP_KEY) || {};
  const settings = raw.settings || {};
  const cycles = Array.isArray(raw.cycles) ? raw.cycles : [];
  return { cycles, settings };
}
function predictNextCycle(){
  const { cycles, settings } = readAppData();
  const avgCycle = settings.averageCycleLength || 28;
  const periodLen = settings.averagePeriodLength || 5;
  if(!cycles.length) return null;
  const last = cycles[cycles.length-1];
  if(!last || !last.startDate) return null;
  const lastStart = new Date(last.startDate);
  if(isNaN(lastStart)) return null;
  const nextStart = new Date(lastStart.getTime() + avgCycle*86400000);
  const nextEnd = new Date(nextStart.getTime() + (periodLen-1)*86400000);
  const ovulation = new Date(nextStart.getTime() - 14*86400000);
  const fertileA = new Date(ovulation.getTime() - 5*86400000);
  const fertileB = new Date(ovulation.getTime() + 1*86400000);
  return { nextStart, nextEnd, ovulation, fertileA, fertileB, avgCycle, periodLen, lastStart };
}
function currentPhase(){
  const f = predictNextCycle();
  if(!f) return null;
  const d = daysUntil(f.nextStart);
  if(d < 0) return { name:"Месячные", tip:"Идут или начались недавно. Поддержи теплом и заботой." };
  if(d <= 3) return { name:"ПМС", tip:"Близится менструация: возможны перепады настроения, тяга к сладкому." };
  const cycleDay = f.avgCycle - d;
  if(cycleDay >= 10 && cycleDay <= 16) return { name:"Овуляция", tip:"Пик энергии и либидо. Хорошее время для активностей." };
  if(cycleDay > 16) return { name:"Лютеиновая фаза", tip:"Постепенно нарастает усталость, чувствительность к стрессу." };
  return { name:"Фолликулярная фаза", tip:"Постменструальный подъём энергии, ясный ум." };
}

function renderCalendar(){
  const f = predictNextCycle();
  const host = $("sp-calendar-body");
  if(!f){ host.textContent = "Заполни данные о цикле в основном приложении."; return; }
  const d = daysUntil(f.nextStart);
  let headline;
  if(d < 0) headline = `<b>Сейчас месячные</b> (начались ${fmtShort(f.nextStart)})`;
  else if(d === 0) headline = `<b>Сегодня — первый день месячных</b>`;
  else headline = `<b>Следующие месячные через ${d} ${pluralDay(d)}</b>`;
  host.innerHTML =
    `<p style="margin:0 0 10px">${headline}</p>`+
    `<div class="sp-row"><span>Менструация</span><b>${fmtDate(f.nextStart)} — ${fmtShort(f.nextEnd)}</b></div>`+
    `<div class="sp-row"><span>Овуляция</span><b>${fmtDate(f.ovulation)}</b></div>`+
    `<div class="sp-row"><span>Фертильное окно</span><b>${fmtShort(f.fertileA)} — ${fmtShort(f.fertileB)}</b></div>`+
    `<div class="sp-row"><span>Средняя длина цикла</span><b>${f.avgCycle} дн.</b></div>`+
    `<div class="sp-row"><span>Менструация длится</span><b>${f.periodLen} дн.</b></div>`;
}

function renderPhase(){
  const p = currentPhase();
  const host = $("sp-phase-body");
  if(!p){ host.textContent = "Нет данных о цикле."; return; }
  host.innerHTML =
    `<div class="sp-row"><span>Сейчас</span><b>${p.name}</b></div>`+
    `<p style="margin:10px 0 0; color:var(--text-soft); line-height:1.5">${p.tip}</p>`;
}

// ----- Symptoms ------------------------------------------------------------ //
async function renderSymptoms(cycleKey){
  const host = $("sp-symptoms-body");
  if(!cycleKey){ host.textContent = "Не нашли ключ цикла."; return; }
  try{
    const r = await fetch(`/v1/lira/diary?cycle_code=${encodeURIComponent(cycleKey)}&days_back=90`);
    const j = await r.json();
    const chart = j.chart || {};
    const series = chart.series || {};
    const labels = chart.labels || [];
    const symptoms = Object.keys(series);
    if(!symptoms.length){
      host.innerHTML = '<div class="sp-empty">Пока нет данных. Открой <a href="/diary.html">дневник</a> и добавь хотя бы одну запись.</div>';
      return;
    }
    let html = "";
    for(const s of symptoms){
      const meta = SYMPTOM_LABELS[s] || { label:s, emoji:"•" };
      const data = series[s] || [];
      const avg = data.length ? (data.reduce((a,b)=>a+b,0)/data.length).toFixed(1) : "0";
      let bars = "";
      for(const v of data){
        const lvl = Math.max(0, Math.min(5, Math.round(v)));
        const h = (lvl/5)*60 + 4;
        bars += `<div class="bar lvl-${lvl}" style="height:${h}px"></div>`;
      }
      html += `<div class="sp-symptom-name">${meta.emoji} ${meta.label}<span class="avg">средний балл ${avg}</span></div>`+
              `<div class="sp-chart">${bars}</div>`;
    }
    if(labels.length){
      html += `<div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center">${labels[0]} — ${labels[labels.length-1]}</div>`;
    }
    host.innerHTML = html;
  }catch(e){
    host.innerHTML = '<div class="sp-empty">Не удалось загрузить графики. Попробуй ещё раз.</div>';
  }
}

async function renderNotes(cycleKey){
  const host = $("sp-notes-body");
  if(!cycleKey){ host.textContent = "Нет ключа."; return; }
  try{
    const r = await fetch(`/v1/lira/diary?cycle_code=${encodeURIComponent(cycleKey)}&days_back=90`);
    const j = await r.json();
    const entries = (j.entries || []).filter(e => e.notes && e.notes.trim());
    if(!entries.length){
      host.innerHTML = '<div class="sp-empty">Нет заметок за последние 90 дней.</div>';
      return;
    }
    entries.sort((a,b) => (b.day || "").localeCompare(a.day || ""));
    let html = "";
    for(const e of entries.slice(0, 30)){
      const meta = SYMPTOM_LABELS[e.symptom] || { label:e.symptom, emoji:"•" };
      html += `<div class="sp-row" style="display:block">`+
              `<div style="font-size:12px;color:var(--muted)">${e.day} · ${meta.emoji} ${meta.label} · интенсивность ${e.intensity}</div>`+
              `<div style="font-size:14px;color:var(--text);margin-top:2px">${(e.notes||"").replace(/</g,"&lt;")}</div>`+
              `</div>`;
    }
    host.innerHTML = html;
  }catch(_e){
    host.innerHTML = '<div class="sp-empty">Не удалось загрузить заметки.</div>';
  }
}

// ----- Boot --------------------------------------------------------------- //
async function boot(){
  const { parts, cycle } = getParams();
  const paid = hasActiveSubscription();

  // Free sections.
  if(parts.has("calendar")){ $("sp-card-calendar").hidden = false; renderCalendar(); }
  if(parts.has("phase"))   { $("sp-card-phase").hidden    = false; renderPhase(); }

  // Paid sections — silently hidden if no active subscription.
  if(parts.has("symptoms") && paid){
    $("sp-card-symptoms").hidden = false;
    await renderSymptoms(cycle);
  }
  if(parts.has("notes") && paid){
    $("sp-card-notes").hidden = false;
    await renderNotes(cycle);
  }

  $("sp-sub").textContent = "Создано " + new Date().toLocaleString("ru-RU");

  $("sp-status").textContent =
    paid ? "Все блоки готовы. Нажми «Сохранить как PDF» сверху."
         : "Симптомы и заметки доступны с подпиской.";
  if(!paid) $("sp-status").className = "sp-status";
}

document.getElementById("sp-print").addEventListener("click", () => window.print());
document.getElementById("sp-share").addEventListener("click", async () => {
  const url = window.location.href;
  if(navigator.share){
    try{
      await navigator.share({ title:"Мой цикл — Lira", text:"PDF-выгрузка цикла", url });
      $("sp-status").textContent = "Ссылка отправлена."; $("sp-status").className = "sp-status ok";
      return;
    }catch(_){}
  }
  try{
    await navigator.clipboard.writeText(url);
    $("sp-status").textContent = "Ссылка скопирована в буфер."; $("sp-status").className = "sp-status ok";
  }catch(_){
    $("sp-status").textContent = "Скопируй ссылку из адресной строки."; $("sp-status").className = "sp-status";
  }
});

boot();
</script>
</body>
</html>
