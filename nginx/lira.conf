# /etc/nginx/sites-available/lira
# HTTP-only конфиг для старта. После добавления домена certbot сам
# впишет HTTPS-блок и редирект 80→443.

# === Rate limiting zones (общие для всех server-блоков) ===
limit_req_zone $binary_remote_addr zone=lira_chat:10m   rate=30r/m;
limit_req_zone $binary_remote_addr zone=lira_pay:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=lira_default:10m rate=300r/m;
limit_conn_zone $binary_remote_addr zone=lira_conn:10m;

# Сканеры и плохие боты — отвечаем 444 (просто закрываем коннект)
map $http_user_agent $lira_bad_bot {
    default 0;
    "~*(?:sqlmap|nikto|nmap|masscan|zgrab|wpscan|acunetix|nessus|burpcollab|fimap|libwww|wget/[^a-z]|curl/[^a-z]\d|python-requests|go-http-client|java/|httpx|nuclei)" 1;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # === Базовая защита и невидимость ===
    server_tokens off;
    client_max_body_size 1m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 15s;
    limit_conn lira_conn 50;

    # Сразу режем плохих ботов
    if ($lira_bad_bot) { return 444; }

    # Блок популярных сканер-путей. Возвращаем 444 без логов.
    location ~* "(?:^|/)(?:\.git|\.env|\.svn|\.hg|\.DS_Store|wp-admin|wp-login|wp-content|wp-includes|phpmyadmin|pma|adminer|xmlrpc\.php|telescope|server-status|server-info|\.aws|\.ssh|id_rsa)(?:$|/)" {
        access_log off;
        return 444;
    }
    location ~* "\.(?:php|asp|aspx|jsp|cgi)$" {
        access_log off;
        return 444;
    }

    # === Статика приложения ===
    root /var/www/lira;
    index index.html;

    # SPA fallback: всё, что не файл, отдаёт index.html
    location / {
        limit_req zone=lira_default burst=30 nodelay;

        # === Security headers ===
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        # HSTS включится автоматически когда certbot повесит SSL.
        # CSP «спокойная»: same-origin для скриптов, разрешён inline (Expo бандл).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https:; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        try_files $uri $uri/ /index.html;
    }

    # === Service Worker — отдаём с no-cache (важно для обновлений) ===
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # === API: проксируем на локальный FastAPI ===
    location /v1/lira/chat {
        limit_req zone=lira_chat burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ~ ^/v1/lira/(subscription|onboarding|cycle-update)$ {
        limit_req zone=lira_pay burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /v1/ {
        limit_req zone=lira_default burst=30 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # === Кэш статики (хеши Expo гарантируют инвалидацию) ===
    location ~* \.(?:js|css|woff2?|png|jpe?g|svg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # === Запрет на просмотр служебных файлов ===
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/lira.access.log;
    error_log  /var/log/nginx/lira.error.log;
}
